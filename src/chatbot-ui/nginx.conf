server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Azure's built-in DNS resolver resolves privatelink and custom private DNS zones.
    # The `set $upstream` variable forces per-request resolution after TTL expiry,
    # which is required for AGW private IP changes after a Terraform re-apply.
    resolver 168.63.129.16 valid=30s ipv6=off;

    # Proxy all /api/* requests through the Application Gateway private listener.
    # The private listener hostname (api.foundry.internal) is registered in a
    # private DNS zone linked to this VNet and resolves to the AGW private IP.
    # This keeps chatbot-api unreachable from the public internet — only nginx
    # in this container can call it via the private AGW path.
    location /api/ {
        set $upstream http://api.foundry.internal;
        proxy_pass $upstream/api/;

        proxy_http_version 1.1;
        proxy_set_header   Host              api.foundry.internal;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;

        # SSE (Server-Sent Events) streaming — must disable buffering and
        # keep the connection alive for the full streaming response duration.
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Strip upstream auth response headers — prevents WWW-Authenticate
        # challenges and any Authorization echo from reaching the browser.
        proxy_hide_header  WWW-Authenticate;
        proxy_hide_header  Authorization;
    }

    # Liveness probe used by Container Apps and AGW health checks
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json always;
    }

    # Hashed assets — cache aggressively; security headers still required here.
    # NOTE: add_header in a location block does NOT inherit from the server block,
    # so every location that sets any header must repeat the full security header set.
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control             "public, immutable"                              always;
        add_header X-Content-Type-Options    "nosniff"                                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"       always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"   always;
        # frame-ancestors 'none' in CSP supersedes X-Frame-Options in all modern browsers;
        # omitting X-Frame-Options avoids conflicting signals to legacy UAs.
        # upgrade-insecure-requests forces the browser to HTTPS even on HTTP pages.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://login.microsoftonline.com; font-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        access_log off;
    }

    # SPA fallback — all other paths serve index.html (no caching on the shell)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control             "no-store"                                       always;
        add_header X-Content-Type-Options    "nosniff"                                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"       always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"   always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://login.microsoftonline.com; font-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
    }
}
