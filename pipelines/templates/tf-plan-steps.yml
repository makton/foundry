parameters:
  - name: environment
    type: string
  - name: serviceConnection
    type: string

steps:
  - script: |
      curl -fsSL \
        "https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip" \
        -o /tmp/tf.zip
      unzip -q /tmp/tf.zip -d /tmp
      sudo mv /tmp/terraform /usr/local/bin/
      terraform version
    displayName: Install Terraform

  - task: AzureCLI@2
    displayName: Init
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      addSpnToEnvironment: true
      workingDirectory: $(Build.SourcesDirectory)/terraform
      script: |
        export ARM_USE_OIDC=true
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_TENANT_ID=$tenantId
        export ARM_OIDC_TOKEN=$idToken
        export ARM_SUBSCRIPTION_ID=$(SUBSCRIPTION_ID)

        terraform init \
          -backend-config="resource_group_name=$(TF_STATE_RG)" \
          -backend-config="storage_account_name=$(TF_STATE_SA)" \
          -backend-config="container_name=$(TF_STATE_CONTAINER)" \
          -backend-config="key=$(TF_STATE_KEY)" \
          -backend-config="use_oidc=true" \
          -input=false

  - task: AzureCLI@2
    displayName: Plan
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      addSpnToEnvironment: true
      workingDirectory: $(Build.SourcesDirectory)/terraform
      script: |
        export ARM_USE_OIDC=true
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_TENANT_ID=$tenantId
        export ARM_OIDC_TOKEN=$idToken
        export ARM_SUBSCRIPTION_ID=$(SUBSCRIPTION_ID)

        terraform plan \
          -var-file="environments/${{ parameters.environment }}.tfvars" \
          -var="use_oidc=true" \
          -var="subscription_id=$(SUBSCRIPTION_ID)" \
          -out=tfplan \
          -input=false \
          -no-color \
          2>&1 | tee tfplan.txt

  - publish: $(Build.SourcesDirectory)/terraform/tfplan
    artifact: tfplan-${{ parameters.environment }}
    displayName: Publish plan artifact

  - publish: $(Build.SourcesDirectory)/terraform/tfplan.txt
    artifact: tfplan-txt-${{ parameters.environment }}
    displayName: Publish plan summary
