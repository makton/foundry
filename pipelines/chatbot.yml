# Chatbot container build + push to ACR
#
# Flow:
#   PR   → validate (docker build only, no push, no Azure creds)
#   main → build & push to dev ACR → [approval] → promote to prod ACR
#
# Image promotion uses `az acr import` so the prod image is byte-for-byte
# identical to what ran in dev (same digest, not a fresh build).
#
# ── One-time ADO setup ────────────────────────────────────────────────────────
# Variable groups (Pipelines → Library → Variable groups):
#
#   vg-foundry-dev
#     SUBSCRIPTION_ID      – Azure subscription ID for dev
#     ACR_NAME             – ACR name            (acrfoundrydev001)
#     RESOURCE_GROUP       – Main resource group  (rg-foundry-dev-eus-001)
#     CHATBOT_UI_APP_NAME  – Container App name   (ca-chatbot-ui-foundry-dev-eus-001)
#     CHATBOT_API_APP_NAME – Container App name   (ca-chatbot-api-foundry-dev-eus-001)
#
#   vg-foundry-prod        – same variable names, prod values; plus:
#     DEV_ACR_NAME         – Source ACR for import (acrfoundrydev001)
#
# Service connections (Project settings → Service connections):
#   sc-foundry-dev   – Workload Identity Federation → dev subscription
#   sc-foundry-prod  – Workload Identity Federation → prod subscription
#
# Environments (Pipelines → Environments):
#   foundry-dev   – no approval gates
#   foundry-prod  – add Approvals & Checks → required approvers
#
# RBAC prerequisite for az acr import:
#   Grant the prod service principal AcrPull on the dev ACR so it can pull
#   the source image during promotion:
#   az role assignment create \
#     --role AcrPull \
#     --assignee <prod-sp-object-id> \
#     --scope /subscriptions/<dev-sub>/resourceGroups/.../providers/Microsoft.ContainerRegistry/registries/acrfoundrydev001
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/chatbot-ui/**
      - src/chatbot-api/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/chatbot-ui/**
      - src/chatbot-api/**

variables:
  IMAGE_TAG: $(Build.BuildId)

stages:
  # ── Validate Dockerfiles on PRs (no Azure creds needed) ───────────────────────
  - stage: validate
    displayName: Validate (PR)
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: docker_build
        displayName: docker build (validate only, no push)
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              docker build \
                --platform linux/amd64 \
                -f src/chatbot-ui/Dockerfile \
                -t chatbot-ui:validate \
                src/chatbot-ui
            displayName: Build chatbot-ui
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              docker build \
                --platform linux/amd64 \
                -f src/chatbot-api/Dockerfile \
                -t chatbot-api:validate \
                src/chatbot-api
            displayName: Build chatbot-api
            workingDirectory: $(Build.SourcesDirectory)

  # ── Build + Push to dev ACR (main branch only) ────────────────────────────────
  # Uses ACR Tasks (az acr build) — no Docker daemon required on the agent.
  # Pushes two tags: $(Build.BuildId) for pinning and latest for convenience.
  - stage: build_push_dev
    displayName: Build & Push (dev)
    condition: |
      and(
        not(canceled()),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: build_push
        displayName: acr build + container app update
        pool:
          vmImage: ubuntu-latest
        variables:
          - group: vg-foundry-dev
        steps:
          - task: AzureCLI@2
            displayName: Build chatbot-ui → dev ACR
            inputs:
              azureSubscription: sc-foundry-dev
              scriptType: bash
              workingDirectory: $(Build.SourcesDirectory)
              script: |
                az acr build \
                  --registry $(ACR_NAME) \
                  --image "chatbot-ui:$(IMAGE_TAG)" \
                  --image "chatbot-ui:latest" \
                  --platform linux/amd64 \
                  --file src/chatbot-ui/Dockerfile \
                  src/chatbot-ui

          - task: AzureCLI@2
            displayName: Build chatbot-api → dev ACR
            inputs:
              azureSubscription: sc-foundry-dev
              scriptType: bash
              workingDirectory: $(Build.SourcesDirectory)
              script: |
                az acr build \
                  --registry $(ACR_NAME) \
                  --image "chatbot-api:$(IMAGE_TAG)" \
                  --image "chatbot-api:latest" \
                  --platform linux/amd64 \
                  --file src/chatbot-api/Dockerfile \
                  src/chatbot-api

          - task: AzureCLI@2
            displayName: Update dev Container Apps
            inputs:
              azureSubscription: sc-foundry-dev
              scriptType: bash
              script: |
                az containerapp update \
                  --name $(CHATBOT_UI_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --image "$(ACR_NAME).azurecr.io/chatbot-ui:$(IMAGE_TAG)"

                az containerapp update \
                  --name $(CHATBOT_API_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --image "$(ACR_NAME).azurecr.io/chatbot-api:$(IMAGE_TAG)"

          - script: |
              echo "##vso[task.setvariable variable=PUBLISHED_TAG;isOutput=true]$(IMAGE_TAG)"
              echo "Images pushed:"
              echo "  $(ACR_NAME).azurecr.io/chatbot-ui:$(IMAGE_TAG)"
              echo "  $(ACR_NAME).azurecr.io/chatbot-api:$(IMAGE_TAG)"
            name: tag_output
            displayName: Output image tags

  # ── Promote to prod ACR (approval gate on foundry-prod environment) ───────────
  # Imports the exact image digests from dev ACR — no rebuild from source.
  - stage: push_prod
    displayName: Push (prod)
    dependsOn: build_push_dev
    condition: succeeded('build_push_dev')
    jobs:
      - deployment: push_prod
        displayName: import to prod ACR + container app update
        pool:
          vmImage: ubuntu-latest
        environment: foundry-prod
        variables:
          - group: vg-foundry-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: none

                - task: AzureCLI@2
                  displayName: Import chatbot images → prod ACR
                  inputs:
                    azureSubscription: sc-foundry-prod
                    scriptType: bash
                    script: |
                      for app in chatbot-ui chatbot-api; do
                        az acr import \
                          --name $(ACR_NAME) \
                          --source "$(DEV_ACR_NAME).azurecr.io/${app}:$(IMAGE_TAG)" \
                          --image "${app}:$(IMAGE_TAG)" \
                          --image "${app}:latest" \
                          --force
                        echo "Imported ${app}:$(IMAGE_TAG) → $(ACR_NAME)"
                      done

                - task: AzureCLI@2
                  displayName: Update prod Container Apps
                  inputs:
                    azureSubscription: sc-foundry-prod
                    scriptType: bash
                    script: |
                      az containerapp update \
                        --name $(CHATBOT_UI_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image "$(ACR_NAME).azurecr.io/chatbot-ui:$(IMAGE_TAG)"

                      az containerapp update \
                        --name $(CHATBOT_API_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image "$(ACR_NAME).azurecr.io/chatbot-api:$(IMAGE_TAG)"

                      echo "Prod Container Apps updated to tag: $(IMAGE_TAG)"
